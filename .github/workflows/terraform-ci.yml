name: Terraform CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/dev

    env:
      TF_VAR_ami: ${{ secrets.AMI }}
      TF_VAR_key_name: ${{ secrets.KEY_NAME }}
      TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}
      TF_VAR_cidr_ip_from_internet: ${{ secrets.CIDR_IP_FROM_INTERNET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::205619292566:role/GithubActionsTerraformRole
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        run: terraform test

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## Terraform Plan Result 🚀

            \`\`\`
            ${process.env.PLAN}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
